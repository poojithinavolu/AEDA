{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-body">
        <h4>Upload Dataset</h4>
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}
          {{ form.as_p }}
          <button class="btn btn-success" type="submit">Upload + Analyze</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
